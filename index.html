<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화이트데이 선물</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#fff0f5,#ffe4ec);
text-align:center;
overflow:hidden;
}

.container{
margin-top:120px;
}

h1{
color:#ff4d6d;
font-size:40px;
}

h2{
color:#e63960;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.music{
position:fixed;
top:20px;
right:20px;
background:white;
color:#ff4d6d;
}

.step{
display:none;
}

.active{
display:block;
}

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear forwards;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

.message{
max-width:500px;
margin:20px auto;
font-size:18px;
line-height:1.8;
white-space:pre-line;
}

.bigheart{
font-size:70px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button class="music" onclick="toggleMusic()">🎵 음악</button>

<div class="container">

<div id="step1" class="step active">
<h1>🎁 화이트데이 선물</h1>
<p>깜짝 선물 놀랐지 임마!</p>
<button onclick="next(2)">열어보기</button>
</div>

<div id="step2" class="step">
<h2>요즘 너랑 있는 시간이 행복해</h2>
<p>사랑해🫶</p>
<button onclick="next(3)">다음</button>
</div>

<div id="step3" class="step">

<div class="bigheart">💖</div>

<h2>나랑 </h2>

<div class="message" id="text"></div>

<button onclick="hearts()">하트 더 받기</button>

</div>

</div>

<script>

const message = `항상 내 곁에 있어줘서 고마워.

너랑 사귄 이후에 하루하루가 너무 행복해

아직 너에 비해 내가 많이 부족해 보이지만 앞으로 더 좋은 사람이 될 수 있도록 노력할게

앞으로도 싸우지 말고 행복하게 지내자
사랑해💕`;

let index=0;
let playing=false;

function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");

if(n===3){
type();
}
}

function type(){
const el=document.getElementById("text");
const letters=message.split("");

let timer=setInterval(()=>{
el.innerHTML+=letters[index];
index++;

if(index>=letters.length){
clearInterval(timer);
}

},40);
}

function toggleMusic(){
const audio=document.getElementById("bgm");

if(playing){
audio.pause();
playing=false;
}else{
audio.play();
playing=true;
}
}

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerText="💗";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
}

function hearts(){
for(let i=0;i<20;i++){
setTimeout(createHeart,i*120);
}
}

setInterval(createHeart,1200);

</script>

</body>
</html>
